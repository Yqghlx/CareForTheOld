name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # 后端：构建 + 单元测试（快速反馈，不需要 Docker）
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: 设置 .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 还原依赖
        run: dotnet restore

      - name: 构建
        run: dotnet build --no-restore --configuration Release

      - name: 运行单元测试
        run: dotnet test --no-build --configuration Release --filter "FullyQualifiedName!~Integration" --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: 上传测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/

  # 后端集成测试：使用 Testcontainers 在真实 PostgreSQL 上运行
  # github-hosted ubuntu-latest 自带 Docker，可直接运行
  backend-integration:
    runs-on: ubuntu-latest
    needs: backend
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: 设置 .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 还原依赖
        run: dotnet restore

      - name: 构建
        run: dotnet build --no-restore --configuration Release

      - name: 运行集成测试（Testcontainers + PostgreSQL）
        run: dotnet test --no-build --configuration Release --filter "FullyQualifiedName~Integration" --collect:"XPlat Code Coverage" --results-directory ./coverage-integration

      - name: 上传集成测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: coverage-integration/

  # 数据库迁移一致性检查：确保所有 DbSet 实体都有对应迁移
  migration-check:
    runs-on: ubuntu-latest
    needs: backend
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: 设置 .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 检查迁移一致性
        run: bash scripts/check-migrations.sh

  # 前后端 API 路径一致性检查
  api-path-check:
    runs-on: ubuntu-latest
    needs: backend
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: 检查 API 路径一致性
        run: bash scripts/check-api-paths.sh

  # 前端：分析 + 构建
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_client

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: 设置 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Gradle 缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 安装依赖
        run: flutter pub get

      - name: 注入 google-services.json
        if: github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json

      - name: 静态分析
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: 构建 APK（仅 main 分支）
        if: github.ref == 'refs/heads/main'
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"
        run: flutter build apk --release --dart-define=APP_ENV=production

      - name: 上传 APK
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: flutter_client/build/app/outputs/flutter-apk/app-release.apk

  # Docker 镜像构建 + 推送（仅 main 分支，所有测试通过后）
  docker:
    runs-on: ubuntu-latest
    needs: [backend, backend-integration, migration-check, api-path-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取 Docker 元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 发布 GitHub Release（仅 main 分支推送时触发，所有检查通过后）
  release:
    runs-on: ubuntu-latest
    needs: [backend, backend-integration, frontend, migration-check, api-path-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载 APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: ./release-assets

      - name: 生成版本号
        id: version
        run: |
          DATE_TAG=$(date +'%Y.%m.%d')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=v${DATE_TAG}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      - name: 生成更新日志
        id: changelog
        run: |
          # 获取上个 Release 到当前的提交记录
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            LOG=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log -20 --pretty=format:"- %s (%h)" --no-merges)
          fi
          # 写入文件，避免多行字符串问题
          echo "$LOG" > /tmp/changelog.txt
          echo "file=/tmp/changelog.txt" >> $GITHUB_OUTPUT

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body_path: ${{ steps.changelog.outputs.file }}
          files: ./release-assets/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
