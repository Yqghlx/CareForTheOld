name: care_for_the_old_client
description: 关爱老人 App - 健康监测与用药提醒客户端
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.0

  # 路由
  go_router: ^13.0.0

  # 网络请求
  dio: ^5.4.0

  # 本地存储
  shared_preferences: ^2.2.0

  # JSON 序列化
  json_annotation: ^4.8.0

  # UI 组件
  cupertino_icons: ^1.0.6

  # 国际化
  intl: ^0.19.0

  # 时间处理
  uuid: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: PingFangSC
      fonts:
        - asset: assets/fonts/PingFangSC-Regular.ttf