name: care_for_the_old_client
description: 关爱老人 App - 健康监测与用药提醒客户端
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.0

  # 路由
  go_router: ^13.0.0

  # 网络请求
  dio: ^5.4.0

  # 本地存储
  shared_preferences: ^2.2.0

  # 安全存储（Token 等敏感信息加密存储）
  flutter_secure_storage: ^9.2.0

  # 图片缓存加载（网络图片 + 占位图 + 错误图）
  cached_network_image: ^3.3.0

  # JSON 序列化
  json_annotation: ^4.8.0

  # UI 组件
  cupertino_icons: ^1.0.6

  # 图表
  fl_chart: ^0.66.0

  # 定位
  geolocator: ^12.0.0

  # SignalR 实时通信
  signalr_netcore: ^1.3.0

  # 本地通知
  flutter_local_notifications: ^18.0.0

  # 分享文件
  share_plus: ^10.0.0

  # 文件系统路径
  path_provider: ^2.1.0

  # 日志框架
  logging: ^1.2.0

  # 国际化
  intl: ^0.20.2

  # 网络连接检测
  connectivity_plus: ^6.0.0

  # 应用信息（版本号等）
  package_info_plus: ^8.0.0

  # 设备电量
  battery_plus: ^6.0.0

  # 错误监控
  sentry_flutter: ^9.0.0

  # 语音识别
  speech_to_text: ^7.0.0

  # 图片选择
  image_picker: ^1.0.0

  # OCR 文字识别（本地离线）
  google_mlkit_text_recognition: ^0.11.0

  # 时间处理
  uuid: ^4.2.0
  url_launcher: ^6.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 地图（使用 flutter_map + OpenStreetMap，免费无需 API Key）
  flutter_map: ^7.0.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/